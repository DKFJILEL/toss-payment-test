<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>인포맥스 결제창</title>
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; box-sizing: border-box; }
        #payment-button { width: 100%; padding: 15px; background: #3182f6; color: white; border: none; cursor: pointer; margin-top: 20px; font-size: 16px; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>인포맥스 결제 정보 입력</h2>
    <div class="input-group">
        <label>결제 금액 (원)</label>
        <input type="number" id="amount-input" value="50000">
    </div>
    <div class="input-group">
        <label>이름</label>
        <input type="text" id="name-input" placeholder="이름을 입력하세요">
    </div>
    <div class="input-group">
        <label>이메일</label>
        <input type="email" id="email-input" placeholder="test@email.com">
    </div>
    <div class="input-group">
        <label>연락처</label>
        <input type="tel" id="phone-input" placeholder="01012345678">
    </div>

    <div id="payment-method"></div>
    <div id="agreement"></div>
    <button id="payment-button">결제하기</button>

    <script>
        main();
        async function main() {
            const clientKey = "test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm";
            const tossPayments = TossPayments(clientKey);
            const customerKey = "USER_" + Math.random().toString(36).substring(2, 10);
            const widgets = tossPayments.widgets({ customerKey });

            const amountInput = document.getElementById("amount-input");

            // 초기 금액 설정
            await widgets.setAmount({ currency: "KRW", value: parseInt(amountInput.value) });

            // UI 렌더링
            await Promise.all([
                widgets.renderPaymentMethods({ selector: "#payment-method", variantKey: "DEFAULT" }),
                widgets.renderAgreement({ selector: "#agreement", variantKey: "AGREEMENT" })
            ]);

            // 금액 변경 시 업데이트
            amountInput.addEventListener("input", async () => {
                await widgets.setAmount({ currency: "KRW", value: parseInt(amountInput.value) || 0 });
            });

            document.getElementById("payment-button").addEventListener("click", async () => {
                await widgets.requestPayment({
                    orderId: "ORDER_" + new Date().getTime(),
                    orderName: "인포맥스 서비스 이용료",
                    successUrl: window.location.origin + "/success.html",
                    failUrl: window.location.origin + "/fail.html",
                    customerEmail: document.getElementById("email-input").value,
                    customerName: document.getElementById("name-input").value,
                    customerMobilePhone: document.getElementById("phone-input").value,
                });
            });
        }
    </script>
</body>
</html>
